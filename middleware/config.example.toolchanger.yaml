# =============================================================
# SpoolSense NFC Middleware — Configuration (Multi-Toolhead)
# =============================================================
# Copy this file to ~/SpoolSense/config.yaml and fill in your values.
#
#   cp config.example.toolchanger.yaml ~/SpoolSense/config.yaml
#
# This config is for multi-toolhead printers (e.g. MadMax,
# Stealthchanger). Each toolhead has its own scanner. The spool
# ID is saved per toolhead and restored on Klipper restart.
# =============================================================

# ---- MQTT Broker --------------------------------------------
mqtt:
  broker: "YOUR_HOME_ASSISTANT_IP"    # e.g. "192.168.1.100"
  port: 1883
  username: "your_mqtt_username"
  password: "your_mqtt_password"

# ---- Spoolman URL (optional) -------------------------------
spoolman_url: "http://YOUR_SPOOLMAN_IP:7912"

# ---- Moonraker URL ------------------------------------------
moonraker_url: "http://YOUR_KLIPPER_IP"

# ---- Low Spool Threshold ------------------------------------
low_spool_threshold: 100

# ---- Scanners ------------------------------------------------
# One scanner per toolhead.
scanners:
  "YOUR_DEVICE_ID_1":
    action: "toolhead"
    toolhead: "T0"
  "YOUR_DEVICE_ID_2":
    action: "toolhead"
    toolhead: "T1"
  "YOUR_DEVICE_ID_3":
    action: "toolhead"
    toolhead: "T2"
  "YOUR_DEVICE_ID_4":
    action: "toolhead"
    toolhead: "T3"

scanner_topic_prefix: "spoolsense"

# ---- Klipper Variables File (optional) ----------------------
# Path to Klipper's save_variables file.
# If not set, the middleware auto-discovers it from Moonraker.
# klipper_var_path: "~/printer_data/config/klipper-toolchanger/offset_save_file.cfg"

# ---- Tag Writeback (optional) ------------------------------
# tag_writeback_enabled: false
