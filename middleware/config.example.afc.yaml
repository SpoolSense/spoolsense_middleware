# =============================================================
# SpoolSense NFC Middleware — Configuration (AFC / BoxTurtle)
# =============================================================
# Copy this file to ~/SpoolSense/config.yaml and fill in your values.
#
#   cp config.example.afc.yaml ~/SpoolSense/config.yaml
#
# This config is for AFC-based filament changers (BoxTurtle, NightOwl,
# etc.) running the AFC-Klipper Add-On.
# =============================================================

# ---- MQTT Broker --------------------------------------------
# Usually your Home Assistant server running Mosquitto.
mqtt:
  broker: "YOUR_HOME_ASSISTANT_IP"    # e.g. "192.168.1.100"
  port: 1883
  username: "your_mqtt_username"
  password: "your_mqtt_password"

# ---- Spoolman URL (optional) -------------------------------
# Default port is 7912.
# If omitted, SpoolSense runs in tag-only mode:
# scans still activate lanes and publish color/lock state,
# but Spoolman lookup, spool creation, and weight sync are disabled.
spoolman_url: "http://YOUR_SPOOLMAN_IP:7912"

# ---- Moonraker URL ------------------------------------------
# Your Klipper/Moonraker instance.
moonraker_url: "http://YOUR_KLIPPER_IP"

# ---- Low Spool Threshold ------------------------------------
# Remaining weight (grams) that triggers a low spool warning.
low_spool_threshold: 100

# ---- Scanners ------------------------------------------------
# Each scanner is identified by its MQTT device ID and configured
# with an action that determines what happens when a spool is scanned.
#
# To find your scanner's device_id:
# 1. Power on the scanner and scan any tag.
# 2. Watch your MQTT broker for topics like:
#      spoolsense/<device_id>/tag/state
# 3. Use that <device_id> as the key below.
#
# Actions:
#   afc_stage  — Stages the spool for the next AFC lane load.
#                Use with a single shared scanner. The user scans a spool,
#                then loads filament into any lane. AFC assigns the spool
#                to whichever lane receives the filament.
#                SET_NEXT_SPOOL_ID is global — one pending spool for the
#                entire printer regardless of how many AFC units.
#
#   afc_lane   — Assigns the spool directly to a specific AFC lane.
#                Use with one scanner per lane (dedicated scanner setup).
#                Locks the scanner until the lane is cleared.
#
# ---- Option A: Single shared scanner (recommended) -----------
# One scanner for all lanes. Scan a spool, load it into any lane.
scanners:
  "YOUR_DEVICE_ID":
    action: "afc_stage"

# ---- Option B: One scanner per lane -------------------------
# Uncomment and configure if you have a dedicated scanner per lane.
# scanners:
#   "ecb338":
#     action: "afc_lane"
#     lane: "lane1"
#   "abcd12":
#     action: "afc_lane"
#     lane: "lane2"
#   "ef3456":
#     action: "afc_lane"
#     lane: "lane3"
#   "gh7890":
#     action: "afc_lane"
#     lane: "lane4"

# ---- Toolheads (optional) -----------------------------------
# If omitted, the middleware derives this list from your scanner
# config. Only needed if you want to explicitly declare lanes.
# toolheads:
#   - "lane1"
#   - "lane2"
#   - "lane3"
#   - "lane4"

scanner_topic_prefix: "spoolsense"

# ---- Tag Writeback (optional) ------------------------------
# Controls whether SpoolSense writes updated remaining weight back to
# OpenPrintTag tags when the tag is stale (tag remaining > Spoolman remaining).
#
# false (default) — dry-run mode. Write decisions are logged but no MQTT
#   command is published.
# true — live mode. Publishes update_remaining commands to the scanner.
#
# tag_writeback_enabled: false
